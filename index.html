<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="game-container glass">
        <header>
            <h1>Tic-Tac-Toe</h1>
            <div class="mode-selector">
                <button id="mode-pvp" class="btn active">Vs Player</button>
                <button id="mode-pve" class="btn">Vs AI</button>
            </div>
            <div class="status-board">
                <div class="player-score px active-turn">
                    <span class="label">PLAYER X</span>
                    <span class="score" id="score-x">0</span>
                </div>
                <div class="player-score po">
                    <span class="label">PLAYER O</span>
                    <span class="score" id="score-o">0</span>
                </div>
            </div>
        </header>

        <main class="board-wrapper">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <div class="game-over-modal" id="modal">
                <h2 id="modal-text">Player X Wins!</h2>
                <button id="restart-btn" class="btn btn-primary">Play Again</button>
            </div>
        </main>
        
        <footer>
            <button id="reset-score-btn" class="btn btn-secondary">Reset Scores</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
